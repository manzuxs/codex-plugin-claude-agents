name: CI

on:
  push:
  pull_request:

jobs:
  project-checks:
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    runs-on: ubuntu-latest
    name: Node.js ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm run check
      - run: npm test
