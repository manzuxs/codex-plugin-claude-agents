<svg viewBox="0 0 1280 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex 与 Claude Code Agents 协作流程</title>
  <desc id="desc">Codex 负责探索、规划和验收，插件选择并调用专业智能体，Claude Code 在目标仓库执行，结果经过精简后返回 Codex 审查。</desc>
  <style>
    text { font-family: 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', Arial, sans-serif; }
    .region-title { font-size: 10px; font-weight: 600; letter-spacing: 0; }
    .component { font-size: 12px; font-weight: 600; fill: #f8fafc; }
    .description { font-size: 9px; font-weight: 400; fill: #94a3b8; }
    .small { font-size: 8px; font-weight: 500; fill: #cbd5e1; }
    .arrow-label { font-size: 8px; font-weight: 600; fill: #cbd5e1; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1280" height="680" fill="#0f172a"/>
  <rect width="1280" height="680" fill="url(#grid)"/>

  <text id="diagram-title" x="40" y="38" fill="#f8fafc" font-size="18" font-weight="700">Codex → Claude Code Agents</text>
  <text x="40" y="58" fill="#94a3b8" font-size="9">计划留在 Codex，专业执行交给选中的智能体，最终证据回到 Codex 验收</text>

  <!-- Region boundaries -->
  <rect x="40" y="105" width="240" height="405" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="54" y="124" fill="#22d3ee" class="region-title">CODEX · 规划与验收</text>

  <rect x="330" y="105" width="300" height="405" rx="10" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="344" y="124" fill="#34d399" class="region-title">PLUGIN · 编排与运行时</text>

  <rect x="680" y="105" width="300" height="405" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="694" y="124" fill="#a78bfa" class="region-title">CLAUDE CODE · 专业执行</text>

  <rect x="1030" y="105" width="210" height="405" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="1044" y="124" fill="#fbbf24" class="region-title">WORKSPACE · 目标仓库</text>

  <!-- Connectors behind components -->
  <path d="M 250 205 L 360 205" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <path d="M 480 235 L 480 274" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <path d="M 600 309 L 650 309 L 650 205 L 710 205" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <path d="M 950 205 L 1060 205" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-violet)"/>
  <path d="M 1135 240 L 1135 294" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <path d="M 1135 374 L 1135 560 L 160 560 L 160 445" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <path d="M 480 430 L 650 430 L 650 350 L 710 350" fill="none" stroke="#64748b" stroke-width="1.25" stroke-dasharray="5,4" marker-end="url(#arrow-violet)"/>

  <!-- Arrow labels -->
  <rect x="284" y="184" width="72" height="18" rx="3" fill="#0f172a"/>
  <text x="320" y="196" text-anchor="middle" class="arrow-label">已批准计划</text>
  <rect x="622" y="278" width="74" height="18" rx="3" fill="#0f172a"/>
  <text x="659" y="290" text-anchor="middle" class="arrow-label">run_agent</text>
  <rect x="984" y="184" width="72" height="18" rx="3" fill="#0f172a"/>
  <text x="1020" y="196" text-anchor="middle" class="arrow-label">执行修改</text>
  <rect x="552" y="543" width="176" height="20" rx="3" fill="#0f172a"/>
  <text x="640" y="556" text-anchor="middle" class="arrow-label">精简结果 · 测试证据 · planSha256</text>

  <!-- Opaque masks -->
  <rect x="70" y="165" width="180" height="80" rx="6" fill="#0f172a"/>
  <rect x="70" y="365" width="180" height="80" rx="6" fill="#0f172a"/>
  <rect x="360" y="165" width="240" height="70" rx="6" fill="#0f172a"/>
  <rect x="360" y="274" width="240" height="70" rx="6" fill="#0f172a"/>
  <rect x="360" y="390" width="240" height="80" rx="6" fill="#0f172a"/>
  <rect x="710" y="160" width="240" height="90" rx="6" fill="#0f172a"/>
  <rect x="710" y="285" width="240" height="135" rx="6" fill="#0f172a"/>
  <rect x="1060" y="165" width="150" height="75" rx="6" fill="#0f172a"/>
  <rect x="1060" y="294" width="150" height="80" rx="6" fill="#0f172a"/>

  <!-- Codex components -->
  <rect x="70" y="165" width="180" height="80" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="160" y="193" text-anchor="middle" class="component">探索与规划</text>
  <text x="160" y="212" text-anchor="middle" class="description">读取仓库 · 确定范围</text>
  <text x="160" y="228" text-anchor="middle" class="description">计划 · 验收标准</text>

  <rect x="70" y="365" width="180" height="80" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="160" y="393" text-anchor="middle" class="component">最终审查</text>
  <text x="160" y="412" text-anchor="middle" class="description">检查 diff 与测试</text>
  <text x="160" y="428" text-anchor="middle" class="description">报告风险与结论</text>

  <!-- Plugin components -->
  <rect x="360" y="165" width="240" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="480" y="192" text-anchor="middle" class="component">claude-orchestrator</text>
  <text x="480" y="211" text-anchor="middle" class="description">识别任务 · 选择主智能体</text>
  <text x="480" y="226" text-anchor="middle" class="description">复用已批准计划</text>

  <rect x="360" y="274" width="240" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="480" y="301" text-anchor="middle" class="component">MCP Runtime</text>
  <text x="480" y="320" text-anchor="middle" class="description">run_agent · job_status</text>
  <text x="480" y="335" text-anchor="middle" class="description">job_result · job_cancel</text>

  <rect x="360" y="390" width="240" height="80" rx="6" fill="rgba(251,146,60,0.16)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="480" y="416" text-anchor="middle" class="component">配置与智能体注册表</text>
  <text x="480" y="436" text-anchor="middle" class="description">.env 分层配置 · agents.json</text>
  <text x="480" y="452" text-anchor="middle" class="description">模型由用户自行选择</text>

  <!-- Claude components -->
  <rect x="710" y="160" width="240" height="90" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="830" y="188" text-anchor="middle" class="component">选中的专业智能体</text>
  <text x="830" y="208" text-anchor="middle" class="description">独立 XML 方法论与执行规范</text>
  <text x="830" y="225" text-anchor="middle" class="description">--agents · --agent</text>
  <rect x="770" y="232" width="120" height="16" rx="3" fill="rgba(167,139,250,0.18)"/>
  <text x="830" y="243" text-anchor="middle" class="small">Claude Code CLI</text>

  <rect x="710" y="285" width="240" height="135" rx="6" fill="rgba(76,29,149,0.25)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="830" y="307" text-anchor="middle" class="component">8 个角色配置</text>
  <g class="small">
    <rect x="730" y="322" width="90" height="24" rx="4" fill="#1e1b4b" stroke="#7c3aed"/>
    <text x="775" y="338" text-anchor="middle">架构师</text>
    <rect x="840" y="322" width="90" height="24" rx="4" fill="#1e1b4b" stroke="#7c3aed"/>
    <text x="885" y="338" text-anchor="middle">后端工程师</text>
    <rect x="730" y="354" width="90" height="24" rx="4" fill="#1e1b4b" stroke="#7c3aed"/>
    <text x="775" y="370" text-anchor="middle">前端工程师</text>
    <rect x="840" y="354" width="90" height="24" rx="4" fill="#1e1b4b" stroke="#7c3aed"/>
    <text x="885" y="370" text-anchor="middle">UI 设计师</text>
    <rect x="730" y="386" width="90" height="24" rx="4" fill="#1e1b4b" stroke="#7c3aed"/>
    <text x="775" y="402" text-anchor="middle">全栈 · QA</text>
    <rect x="840" y="386" width="90" height="24" rx="4" fill="#1e1b4b" stroke="#7c3aed"/>
    <text x="885" y="402" text-anchor="middle">安全 · DevOps</text>
  </g>

  <!-- Workspace components -->
  <rect x="1060" y="165" width="150" height="75" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1135" y="192" text-anchor="middle" class="component">代码仓库</text>
  <text x="1135" y="211" text-anchor="middle" class="description">读取 · 修改 · 命令</text>
  <text x="1135" y="227" text-anchor="middle" class="description">保持用户工作树</text>

  <rect x="1060" y="294" width="150" height="80" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1135" y="321" text-anchor="middle" class="component">验证证据</text>
  <text x="1135" y="340" text-anchor="middle" class="description">测试 · 类型检查</text>
  <text x="1135" y="356" text-anchor="middle" class="description">diff · 残余风险</text>

  <!-- Footer legend -->
  <g transform="translate(40,620)">
    <circle cx="6" cy="0" r="4" fill="#22d3ee"/>
    <text x="18" y="3" class="description">Codex 责任</text>
    <circle cx="116" cy="0" r="4" fill="#34d399"/>
    <text x="128" y="3" class="description">插件运行时</text>
    <circle cx="250" cy="0" r="4" fill="#a78bfa"/>
    <text x="262" y="3" class="description">专业智能体</text>
    <circle cx="384" cy="0" r="4" fill="#fbbf24"/>
    <text x="396" y="3" class="description">目标仓库</text>
  </g>
  <text x="1240" y="623" text-anchor="end" fill="#64748b" font-size="8">默认只回传精简结果，完整日志按需读取</text>
</svg>
